<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SemeaJovens - Visitantes</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <link rel="apple-touch-icon" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/menu.js"></script>
</head>
<body>
    <div id="app">
        <main class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h3 class="mb-1">Visitantes</h3>
                    <p class="text-muted mb-0">Somente pessoas que preencheram como não EJC e participaram de mais de 3 eventos.</p>
                </div>
                <button class="btn btn-soft-primary" @click="carregar" :disabled="carregando">
                    {{ carregando ? 'Atualizando...' : 'Atualizar' }}
                </button>
            </div>

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Filtrar por nome</label>
                            <input v-model.trim="filtroNome" class="form-control" placeholder="Digite o nome completo">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Filtrar por telefone</label>
                            <input v-model.trim="filtroTelefone" class="form-control" placeholder="Digite o telefone">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome completo</th>
                                <th>Telefone</th>
                                <th>Detalhes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template v-for="item in visitantesFiltrados" :key="`${item.nome_completo}|${item.telefone}`">
                            <tr>
                                <td>
                                    <button class="btn btn-link p-0 text-start fw-semibold" @click="toggleEventos(item)">
                                        {{ item.nome_completo }}
                                    </button>
                                </td>
                                <td>{{ item.telefone }}</td>
                                <td>
                                    <span class="badge bg-soft-primary text-primary">
                                        {{ item.eventos && item.eventos.length ? `${item.eventos.length} eventos` : 'Sem eventos' }}
                                    </span>
                                </td>
                            </tr>
                            <tr v-if="isEventosAbertos(item)">
                                <td colspan="3" class="bg-light">
                                    <div class="small text-muted mb-1">Eventos:</div>
                                    <ul v-if="item.eventos && item.eventos.length" class="mb-0 ps-3">
                                        <li v-for="(evento, idx) in item.eventos" :key="`${item.nome_completo}-${idx}`">{{ evento }}</li>
                                    </ul>
                                    <span v-else class="text-muted">Nenhum evento encontrado.</span>
                                </td>
                            </tr>
                            </template>
                            <tr v-if="carregando">
                                <td colspan="3" class="text-center py-4">
                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                    Carregando...
                                </td>
                            </tr>
                            <tr v-else-if="!visitantesFiltrados.length">
                                <td colspan="3" class="text-center text-muted py-4">Nenhum visitante com mais de 3 participações.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            injetarMenu('#app');
            ativarMenu('/gestaodoencontro/visitantes');
        });

        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    carregando: false,
                    visitantes: [],
                    filtroNome: '',
                    filtroTelefone: '',
                    eventosAbertosKey: ''
                };
            },
            computed: {
                visitantesFiltrados() {
                    const nome = String(this.filtroNome || '').trim().toLowerCase();
                    const telefone = String(this.filtroTelefone || '').trim().toLowerCase();
                    return (this.visitantes || []).filter((item) => {
                        const txtNome = String(item.nome_completo || '').toLowerCase();
                        const txtTelefone = String(item.telefone || '').toLowerCase();
                        const okNome = !nome || txtNome.includes(nome);
                        const okTelefone = !telefone || txtTelefone.includes(telefone);
                        return okNome && okTelefone;
                    });
                }
            },
            methods: {
                keyOf(item) {
                    return `${String(item && item.nome_completo || '').trim()}|${String(item && item.telefone || '').trim()}`;
                },
                isEventosAbertos(item) {
                    return this.eventosAbertosKey && this.eventosAbertosKey === this.keyOf(item);
                },
                toggleEventos(item) {
                    const k = this.keyOf(item);
                    this.eventosAbertosKey = this.eventosAbertosKey === k ? '' : k;
                },
                async carregar() {
                    this.carregando = true;
                    try {
                        const res = await fetch('/api/visitantes');
                        const data = await res.json().catch(() => ([]));
                        if (!res.ok) {
                            alert((data && data.error) || 'Erro ao carregar visitantes.');
                            this.visitantes = [];
                            return;
                        }
                        this.visitantes = Array.isArray(data)
                            ? data.map((i) => ({
                                nome_completo: String(i.nome_completo || '').trim(),
                                telefone: String(i.telefone || '').trim(),
                                eventos: Array.isArray(i.eventos) ? i.eventos : []
                            }))
                            : [];
                        this.eventosAbertosKey = '';
                    } catch (err) {
                        console.error(err);
                        alert('Erro ao carregar visitantes.');
                        this.visitantes = [];
                    } finally {
                        this.carregando = false;
                    }
                }
            },
            mounted() {
                this.carregar();
            }
        }).mount('#app');
    </script>
</body>
</html>
