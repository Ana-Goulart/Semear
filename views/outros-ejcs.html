<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outros EJCs - SemeaJovens</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Vue -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div id="app">
        <main class="container-fluid py-4">
            <div class="row mb-4">
                <div class="col-12 px-2">
                    <div
                        class="page-header d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
                        <h2 class="h4 mb-0 text-gray-800">
                            <i class="fas fa-globe text-primary me-2"></i>Outros EJCs
                        </h2>
                        <button class="btn btn-primary" onclick="window.OutrosEjcsApp.openCreateModal()">
                            <i class="fas fa-plus me-1"></i> Cadastrar Novo
                        </button>
                    </div>
                </div>
            </div>

            <!-- Lista de Outros EJCs -->
            <div class="row">
                <div class="col-12">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                            <h6 class="m-0 font-weight-bold text-primary">EJCs Cadastrados</h6>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered table-hover" id="dataTable" width="100%"
                                    cellspacing="0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Nome do EJC</th>
                                            <th>Paróquia</th>
                                            <th>Bairro</th>
                                            <th class="text-center" style="width: 150px;">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="outrosEjcsTableBody">
                                        <tr>
                                            <td colspan="5" class="text-center">Carregando...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal Form -->
        <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="formModalLabel">Cadastrar Outro EJC</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="outrosEjcsForm" onsubmit="window.OutrosEjcsApp.saveRecord(event)">
                        <div class="modal-body">
                            <input type="hidden" id="recordId">

                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome do EJC <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nome" required
                                    placeholder="Ex: 1º EJC de São Paulo">
                            </div>

                            <div class="mb-3">
                                <label for="paroquia" class="form-label">Paróquia</label>
                                <input type="text" class="form-control" id="paroquia"
                                    placeholder="Ex: Paróquia São José">
                            </div>

                            <div class="mb-3">
                                <label for="bairro" class="form-label">Bairro</label>
                                <input type="text" class="form-control" id="bairro" placeholder="Ex: Centro">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal Detalhes -->
        <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-scrollable">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header">
                        <h5 class="modal-title" id="detailsModalTitle">Detalhes do EJC</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <ul class="nav nav-tabs mb-3" id="detailsTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabInfo" type="button" role="tab">Informações</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabPresencas" type="button" role="tab">Presença</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabConjuges" type="button" role="tab">Cônjuges</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="tabInfo" role="tabpanel">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Nome do EJC</label>
                                        <input type="text" id="detailNome" class="form-control" maxlength="160">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Paróquia</label>
                                        <input type="text" id="detailParoquia" class="form-control" maxlength="255">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Bairro</label>
                                        <input type="text" id="detailBairro" class="form-control" maxlength="255">
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end mt-3">
                                    <button type="button" class="btn btn-primary" id="btnSalvarDetalhes" onclick="window.OutrosEjcsApp.saveDetails()">Salvar alterações</button>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="tabPresencas" role="tabpanel">
                                <div id="presencasLoading" class="text-muted d-none">Carregando presenças...</div>
                                <div id="presencasContainer"></div>
                            </div>

                            <div class="tab-pane fade" id="tabConjuges" role="tabpanel">
                                <div id="conjugesLoading" class="text-muted d-none">Carregando cônjuges...</div>
                                <div id="conjugesContainer"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Menu Component -->
    <script src="/js/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            injetarMenu('#app');
            ativarMenu('/outros-ejcs');

            // Inicializar a aplicação
            window.OutrosEjcsApp.loadData();
        });
    </script>

    <!-- Lógica da Página -->
    <script>
        window.OutrosEjcsApp = (() => {
            let createModalInstance = null;
            let detailsModalInstance = null;
            let currentEjcs = [];
            let selectedId = null;

            // Inicializar o modal do Bootstrap quando disparado o carregamento das functions
            document.addEventListener('DOMContentLoaded', () => {
                const createModalEl = document.getElementById('formModal');
                if (createModalEl) {
                    createModalInstance = new bootstrap.Modal(createModalEl);
                }
                const detailsModalEl = document.getElementById('detailsModal');
                if (detailsModalEl) {
                    detailsModalInstance = new bootstrap.Modal(detailsModalEl);
                }
                const tabsEl = document.getElementById('detailsTabs');
                if (tabsEl) {
                    tabsEl.querySelectorAll('button[data-bs-toggle="tab"]').forEach(btn => {
                        btn.addEventListener('shown.bs.tab', async (ev) => {
                            const target = ev.target.getAttribute('data-bs-target');
                            if (target === '#tabPresencas') await loadPresencas();
                            if (target === '#tabConjuges') await loadConjuges();
                        });
                    });
                }
            });

            async function loadData() {
                const tbody = document.getElementById('outrosEjcsTableBody');
                try {
                    const response = await fetch('/api/outros-ejcs');
                    if (!response.ok) throw new Error('Falha ao carregar dados');

                    currentEjcs = await response.json();
                    renderTable(currentEjcs);
                } catch (error) {
                    console.error(error);
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Erro ao carregar dados.</td></tr>`;
                    Swal.fire('Erro', 'Não foi possível carregar a lista de EJCs.', 'error');
                }
            }

            function renderTable(data) {
                const tbody = document.getElementById('outrosEjcsTableBody');

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Nenhum registro encontrado.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(registro => `
                    <tr style="cursor: pointer;" onclick="window.OutrosEjcsApp.openDetailsModal(${registro.id})">
                        <td class="align-middle fw-medium">${registro.nome || '-'}</td>
                        <td class="align-middle">${registro.paroquia || '-'}</td>
                        <td class="align-middle">${registro.bairro || '-'}</td>
                        <td class="align-middle text-center">
                            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); window.OutrosEjcsApp.deleteRecord(${registro.id})" title="Excluir">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }

            function openCreateModal() {
                document.getElementById('outrosEjcsForm').reset();
                document.getElementById('recordId').value = '';
                document.getElementById('formModalLabel').textContent = 'Cadastrar Outro EJC';
                document.getElementById('btnSalvar').textContent = 'Cadastrar';

                if (createModalInstance) {
                    createModalInstance.show();
                } else {
                    // Fallback
                    createModalInstance = new bootstrap.Modal(document.getElementById('formModal'));
                    createModalInstance.show();
                }
            }

            async function openDetailsModal(id) {
                const registro = currentEjcs.find(e => e.id === id);
                if (!registro) return;
                selectedId = id;

                document.getElementById('detailsModalTitle').textContent = `Outro EJC: ${registro.nome || 'Sem nome'}`;
                document.getElementById('detailNome').value = registro.nome || '';
                document.getElementById('detailParoquia').value = registro.paroquia || '';
                document.getElementById('detailBairro').value = registro.bairro || '';

                document.getElementById('presencasContainer').innerHTML = '';
                document.getElementById('conjugesContainer').innerHTML = '';
                document.getElementById('presencasLoading').classList.add('d-none');
                document.getElementById('conjugesLoading').classList.add('d-none');

                const infoTabBtn = document.querySelector('#detailsTabs button[data-bs-target="#tabInfo"]');
                if (infoTabBtn) bootstrap.Tab.getOrCreateInstance(infoTabBtn).show();

                if (detailsModalInstance) {
                    detailsModalInstance.show();
                } else {
                    detailsModalInstance = new bootstrap.Modal(document.getElementById('detailsModal'));
                    detailsModalInstance.show();
                }
            }

            async function loadPresencas() {
                if (!selectedId) return;
                const loadingEl = document.getElementById('presencasLoading');
                const container = document.getElementById('presencasContainer');
                loadingEl.classList.remove('d-none');
                container.innerHTML = '';

                try {
                    const response = await fetch(`/api/outros-ejcs/${selectedId}/presencas`);
                    const data = await response.json().catch(() => []);
                    if (!response.ok) throw new Error(data.error || 'Erro ao carregar presenças');

                    if (!Array.isArray(data) || data.length === 0) {
                        container.innerHTML = `<div class="text-muted text-center p-3 bg-light border rounded">Nenhuma presença registrada para este EJC.</div>`;
                        return;
                    }

                    const formatarDataEvento = (valor) => {
                        if (!valor) return 'Data não informada';
                        const txt = String(valor).trim();
                        if (!txt) return 'Data não informada';

                        // Caso comum vindo do banco: YYYY-MM-DD
                        if (/^\d{4}-\d{2}-\d{2}$/.test(txt)) {
                            const [ano, mes, dia] = txt.split('-');
                            return `${dia}/${mes}/${ano}`;
                        }

                        // Fallback para timestamps/datetimes
                        const dt = new Date(txt);
                        if (Number.isNaN(dt.getTime())) return 'Data não informada';
                        return dt.toLocaleDateString('pt-BR');
                    };

                    container.innerHTML = data.map(p => {
                        const eventos = Array.isArray(p.eventos) ? p.eventos : [];
                        const eventosHtml = eventos.map(ev => {
                            const dataEvento = formatarDataEvento(ev.data);
                            return `<li>${ev.titulo || 'Evento sem título'} <span class="text-muted">(${dataEvento})</span></li>`;
                        }).join('');
                        return `
                            <div class="border rounded p-3 mb-2 bg-white">
                                <div><strong>Nome:</strong> ${p.nome_completo || '-'}</div>
                                <div><strong>Telefone:</strong> ${p.telefone || '-'}</div>
                                <div class="mt-2"><strong>Evento(s):</strong></div>
                                <ul class="mb-0">${eventosHtml || '<li>-</li>'}</ul>
                            </div>
                        `;
                    }).join('');
                } catch (error) {
                    console.error(error);
                    container.innerHTML = `<div class="text-danger">Erro ao carregar presenças.</div>`;
                } finally {
                    loadingEl.classList.add('d-none');
                }
            }

            async function loadConjuges() {
                if (!selectedId) return;
                const loadingEl = document.getElementById('conjugesLoading');
                const container = document.getElementById('conjugesContainer');
                loadingEl.classList.remove('d-none');
                container.innerHTML = '';

                try {
                    const response = await fetch(`/api/outros-ejcs/${selectedId}/conjuges`);
                    const data = await response.json().catch(() => []);
                    if (!response.ok) throw new Error(data.error || 'Erro ao carregar cônjuges');

                    if (!Array.isArray(data) || data.length === 0) {
                        container.innerHTML = `<div class="text-muted text-center p-3 bg-light border rounded">Nenhum cônjuge vinculado a este EJC.</div>`;
                        return;
                    }

                    container.innerHTML = `
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nome do Cônjuge</th>
                                        <th>Jovem (Inconfidentes)</th>
                                        <th>Telefone</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.map(c => `
                                        <tr>
                                            <td>${c.conjuge_nome || '-'}</td>
                                            <td>${c.jovem_nome || '-'}</td>
                                            <td>${c.telefone || '-'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } catch (error) {
                    console.error(error);
                    container.innerHTML = `<div class="text-danger">Erro ao carregar cônjuges.</div>`;
                } finally {
                    loadingEl.classList.add('d-none');
                }
            }

            async function saveDetails() {
                if (!selectedId) return;
                const nome = document.getElementById('detailNome').value.trim();
                const paroquia = document.getElementById('detailParoquia').value.trim();
                const bairro = document.getElementById('detailBairro').value.trim();
                if (!nome) {
                    Swal.fire('Atenção', 'O nome do EJC é obrigatório.', 'warning');
                    return;
                }

                const btn = document.getElementById('btnSalvarDetalhes');
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
                btn.disabled = true;

                try {
                    const response = await fetch(`/api/outros-ejcs/${selectedId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nome, paroquia, bairro })
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok) throw new Error(payload.error || 'Erro ao salvar');

                    await loadData();
                    const updated = currentEjcs.find(e => e.id === selectedId);
                    if (updated) {
                        document.getElementById('detailsModalTitle').textContent = `Outro EJC: ${updated.nome || 'Sem nome'}`;
                    }
                    Swal.fire({
                        icon: 'success',
                        title: 'Sucesso',
                        text: 'Informações atualizadas.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                } catch (error) {
                    console.error(error);
                    Swal.fire('Erro', error.message, 'error');
                } finally {
                    btn.innerHTML = original;
                    btn.disabled = false;
                }
            }

            async function saveRecord(event) {
                event.preventDefault();

                const id = document.getElementById('recordId').value;
                const nome = document.getElementById('nome').value;
                const paroquia = document.getElementById('paroquia').value;
                const bairro = document.getElementById('bairro').value;

                const isEdit = id !== '';
                const url = isEdit ? `/api/outros-ejcs/${id}` : '/api/outros-ejcs';
                const method = isEdit ? 'PUT' : 'POST';
                const payload = { nome, paroquia, bairro };

                try {
                    const btn = document.getElementById('btnSalvar');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
                    btn.disabled = true;

                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || 'Erro ao salvar');
                    }

                    if (createModalInstance) createModalInstance.hide();
                    await loadData();

                    Swal.fire({
                        icon: 'success',
                        title: 'Sucesso!',
                        text: isEdit ? 'Registro atualizado.' : 'EJC cadastrado com sucesso!',
                        timer: 2000,
                        showConfirmButton: false
                    });

                } catch (error) {
                    console.error(error);
                    Swal.fire('Erro', error.message, 'error');
                } finally {
                    const btn = document.getElementById('btnSalvar');
                    if (btn) {
                        btn.innerHTML = id ? 'Salvar Alterações' : 'Cadastrar';
                        btn.disabled = false;
                    }
                }
            }

            async function deleteRecord(id) {
                const result = await Swal.fire({
                    title: 'Tem certeza?',
                    text: 'Esta ação não pode ser desfeita!',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'Sim, excluir!',
                    cancelButtonText: 'Cancelar'
                });

                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`/api/outros-ejcs/${id}`, { method: 'DELETE' });
                        if (!response.ok) throw new Error('Erro ao excluir');

                        await loadData();
                        Swal.fire('Excluído!', 'O registro foi removido.', 'success');
                    } catch (error) {
                        console.error(error);
                        Swal.fire('Erro', 'Não foi possível excluir o EJC.', 'error');
                    }
                }
            }

            return {
                loadData,
                openCreateModal,
                openDetailsModal,
                loadPresencas,
                loadConjuges,
                saveDetails,
                saveRecord,
                deleteRecord
            };
        })();
    </script>
</body>

</html>
