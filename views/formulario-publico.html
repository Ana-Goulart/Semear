<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Publico</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <link rel="apple-touch-icon" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/ui-kit.js"></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(150deg, #f8fafc 0%, #e2e8f0 40%, #dbeafe 100%);
        }

        .shell {
            max-width: 820px;
            margin: 0 auto;
        }

        .card-form {
            border-radius: 16px;
            border: 0;
            box-shadow: 0 24px 42px rgba(15, 23, 42, 0.16);
        }

        .header {
            background: linear-gradient(120deg, #0f172a 0%, #0ea5e9 100%);
            color: #fff;
            border-radius: 12px;
            padding: 18px;
        }
    </style>
</head>

<body>
    <div id="app" class="container py-4 py-md-5">
        <div class="shell">
            <div class="card card-form">
                <div class="card-body p-4 p-md-5">
                    <div class="header mb-4">
                        <h4 class="mb-1">{{ form.titulo || 'Inscricao' }}</h4>
                        <p class="mb-0 opacity-75">{{ form.descricao || form.tema || 'Preencha os dados para concluir sua inscricao.' }}</p>
                    </div>

                    <div v-if="loading" class="text-muted">Carregando formulario...</div>
                    <div v-else>
                        <div v-if="tipo==='INSCRICAO'">
                            <div class="mb-3" v-for="campo in campos" :key="campo.id">
                                <label class="form-label">{{ campo.label }} <span v-if="campo.obrigatorio" class="text-danger">*</span></label>

                                <input v-if="['texto','telefone','email','data','numero'].includes(campo.tipo)"
                                    class="form-control"
                                    :type="inputType(campo.tipo)"
                                    :placeholder="campo.placeholder || ''"
                                    v-model="respostas[campo.id]">

                                <textarea v-else-if="campo.tipo==='textarea'" class="form-control" rows="3" :placeholder="campo.placeholder || ''" v-model="respostas[campo.id]"></textarea>

                                <select v-else-if="campo.tipo==='select'" class="form-select" v-model="respostas[campo.id]">
                                    <option value="">Selecione...</option>
                                    <option v-for="op in campo.opcoes" :key="op" :value="op">{{ op }}</option>
                                </select>

                                <div v-else-if="campo.tipo==='radio'">
                                    <div class="form-check" v-for="op in campo.opcoes" :key="`${campo.id}-${op}`">
                                        <input class="form-check-input" type="radio" :name="campo.id" :id="`${campo.id}-${op}`" :value="op" v-model="respostas[campo.id]">
                                        <label class="form-check-label" :for="`${campo.id}-${op}`">{{ op }}</label>
                                    </div>
                                </div>

                                <div v-else-if="campo.tipo==='checkbox'">
                                    <div class="form-check" v-for="op in campo.opcoes" :key="`${campo.id}-${op}`">
                                        <input class="form-check-input" type="checkbox" :id="`${campo.id}-${op}`" :value="op" v-model="respostas[campo.id]">
                                        <label class="form-check-label" :for="`${campo.id}-${op}`">{{ op }}</label>
                                    </div>
                                </div>
                            </div>

                            <button class="btn btn-primary w-100" @click="enviarInscricao" :disabled="saving">{{ saving ? 'Enviando...' : 'Enviar inscricao' }}</button>
                        </div>

                        <div v-else>
                            <p class="text-muted">Formulario de presenca padrao</p>
                            <div class="mb-3">
                                <label class="form-label">Nome completo</label>
                                <input class="form-control" v-model="legacy.nome">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input class="form-control" v-model="legacy.telefone">
                            </div>
                            <button class="btn btn-primary w-100" @click="enviarPresenca" :disabled="saving">{{ saving ? 'Enviando...' : 'Registrar presenca' }}</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: false,
                    saving: false,
                    token: '',
                    form: {},
                    tipo: 'INSCRICAO',
                    campos: [],
                    respostas: {},
                    legacy: {
                        nome: '',
                        telefone: ''
                    }
                };
            },
            methods: {
                getTokenFromPath() {
                    const parts = window.location.pathname.split('/').filter(Boolean);
                    return parts[parts.length - 1] || '';
                },
                inputType(tipo) {
                    if (tipo === 'telefone') return 'tel';
                    if (tipo === 'email') return 'email';
                    if (tipo === 'data') return 'date';
                    if (tipo === 'numero') return 'number';
                    return 'text';
                },
                async carregarFormulario() {
                    this.loading = true;
                    try {
                        const res = await fetch(`/api/formularios/public/${encodeURIComponent(this.token)}`);
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            alert(data.error || 'Formulario invalido.');
                            return;
                        }
                        this.form = data.formulario || {};
                        this.tipo = String(this.form.tipo || '').toUpperCase();
                        this.campos = Array.isArray(this.form.campos_config) ? this.form.campos_config : [];
                        this.respostas = {};
                        this.campos.forEach((c) => {
                            this.respostas[c.id] = c.tipo === 'checkbox' ? [] : '';
                        });
                    } catch (err) {
                        console.error(err);
                        alert('Erro ao carregar formulario.');
                    } finally {
                        this.loading = false;
                    }
                },
                validarInscricao() {
                    for (const campo of this.campos) {
                        const valor = this.respostas[campo.id];
                        if (!campo.obrigatorio) continue;
                        if (campo.tipo === 'checkbox') {
                            if (!Array.isArray(valor) || !valor.length) return `Preencha: ${campo.label}`;
                        } else if (!String(valor || '').trim()) {
                            return `Preencha: ${campo.label}`;
                        }
                    }
                    return '';
                },
                async enviarInscricao() {
                    const erro = this.validarInscricao();
                    if (erro) {
                        alert(erro);
                        return;
                    }
                    this.saving = true;
                    try {
                        const res = await fetch(`/api/formularios/public/${encodeURIComponent(this.token)}/respostas`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ respostas: this.respostas })
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            alert(data.error || 'Erro ao enviar inscricao.');
                            return;
                        }
                        alert('Inscricao enviada com sucesso.');
                        this.campos.forEach((c) => {
                            this.respostas[c.id] = c.tipo === 'checkbox' ? [] : '';
                        });
                    } catch (err) {
                        console.error(err);
                        alert('Erro ao enviar inscricao.');
                    } finally {
                        this.saving = false;
                    }
                },
                async enviarPresenca() {
                    if (!this.legacy.nome || !this.legacy.telefone) {
                        alert('Preencha nome e telefone.');
                        return;
                    }
                    this.saving = true;
                    try {
                        const res = await fetch(`/api/formularios/public/${encodeURIComponent(this.token)}/presencas`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                status_ejc: 'NAO_FIZ',
                                nome_completo: this.legacy.nome,
                                telefone: this.legacy.telefone
                            })
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            alert(data.error || 'Erro ao registrar presenca.');
                            return;
                        }
                        alert('Presenca registrada com sucesso.');
                        this.legacy.nome = '';
                        this.legacy.telefone = '';
                    } catch (err) {
                        console.error(err);
                        alert('Erro ao registrar presenca.');
                    } finally {
                        this.saving = false;
                    }
                }
            },
            mounted() {
                this.token = this.getTokenFromPath();
                if (!this.token) {
                    alert('Link invalido.');
                    return;
                }
                this.carregarFormulario();
            }
        }).mount('#app');
    </script>
</body>

</html>
