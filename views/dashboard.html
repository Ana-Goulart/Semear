<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SemeaJovens - Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <link rel="apple-touch-icon" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/menu.js"></script>
</head>
<body>
    <div id="app">
        <main class="container-fluid">
            <div class="mb-4">
                <h3 class="mb-1">Dashboard</h3>
                <p class="text-muted mb-0">Acesso rápido aos principais módulos.</p>
            </div>
            <div class="row g-3">
                <div class="col-md-4">
                    <a class="card border-0 shadow-sm h-100 text-decoration-none" href="/gestaodoencontro/listamestre">
                        <div class="card-body">
                            <h5 class="card-title mb-2">Gestão do Encontro</h5>
                            <p class="text-muted mb-0">Lista Mestre, equipes, montar encontro, moita, garçons e votação.</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a class="card border-0 shadow-sm h-100 text-decoration-none" href="/planejamento/eventos">
                        <div class="card-body">
                            <h5 class="card-title mb-2">Planejamento</h5>
                            <p class="text-muted mb-0">Calendário, eventos e atas de reunião.</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a class="card border-0 shadow-sm h-100 text-decoration-none" href="/administrativo/financeiro">
                        <div class="card-body">
                            <h5 class="card-title mb-2">Administrativo</h5>
                            <p class="text-muted mb-0">Financeiro e anexos.</p>
                        </div>
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            injetarMenu('#app');
            ativarMenu('/dashboard');
        });
    </script>
</body>
</html>
