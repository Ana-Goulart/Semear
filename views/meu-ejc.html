<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>SemeaJovens - Meu EJC</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/menu.js"></script>
</head>

<body>
    <div id="app">
        <main class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">Meu EJC</h3>
            </div>

            <div class="card border-0 shadow-sm" style="max-width: 720px;">
                <div class="card-body">
                    <h5 class="card-title mb-2">Nome oficial do seu EJC</h5>
                    <p class="text-muted mb-3">
                        O nome salvo aqui será usado para substituir automaticamente o texto "Inconfidentes" no sistema.
                    </p>

                    <div class="mb-3">
                        <label class="form-label">Nome do EJC</label>
                        <input type="text" class="form-control" v-model.trim="form.nome"
                            placeholder="Ex.: São José, Santa Luzia, Cristo Rei">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Paróquia</label>
                        <input type="text" class="form-control" v-model.trim="form.paroquia"
                            placeholder="Ex.: Paróquia Nossa Senhora Aparecida">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Endereço</label>
                        <input type="text" class="form-control" v-model.trim="form.endereco"
                            placeholder="Ex.: Rua ..., nº ..., Bairro ..., Cidade ...">
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" @click="salvar" :disabled="salvando || !form.nome">
                            {{ salvando ? 'Salvando...' : 'Salvar Nome' }}
                        </button>
                        <button class="btn btn-soft-secondary" @click="carregar" :disabled="salvando">Recarregar</button>
                    </div>

                    <div class="mt-3" v-if="mensagem">
                        <div class="alert alert-success py-2 mb-0">{{ mensagem }}</div>
                    </div>
                    <div class="mt-3" v-if="erro">
                        <div class="alert alert-danger py-2 mb-0">{{ erro }}</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            injetarMenu('#app');
            ativarMenu('/configuracoes/meuejc');
        });

        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    form: { nome: '', paroquia: '', endereco: '' },
                    salvando: false,
                    mensagem: '',
                    erro: ''
                };
            },
            methods: {
                async carregar() {
                    this.erro = '';
                    this.mensagem = '';
                    try {
                        const res = await fetch('/api/meu-ejc');
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) throw new Error(data.error || 'Erro ao carregar configuração.');
                        this.form.nome = data.nome || 'Inconfidentes';
                        this.form.paroquia = data.paroquia || '';
                        this.form.endereco = data.endereco || '';
                    } catch (e) {
                        this.erro = e.message || 'Erro ao carregar configuração.';
                    }
                },
                async salvar() {
                    this.erro = '';
                    this.mensagem = '';
                    const nome = String(this.form.nome || '').trim();
                    if (!nome) {
                        this.erro = 'Informe o nome do EJC.';
                        return;
                    }
                    this.salvando = true;
                    try {
                        const res = await fetch('/api/meu-ejc', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nome,
                                paroquia: this.form.paroquia || null,
                                endereco: this.form.endereco || null
                            })
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) throw new Error(data.error || 'Erro ao salvar configuração.');
                        this.form.nome = data.nome || nome;
                        if (typeof window.aplicarNomeMeuEJC === 'function') {
                            window.aplicarNomeMeuEJC(this.form.nome);
                        }
                        this.mensagem = 'Nome atualizado com sucesso.';
                    } catch (e) {
                        this.erro = e.message || 'Erro ao salvar configuração.';
                    } finally {
                        this.salvando = false;
                    }
                }
            },
            mounted() {
                this.carregar();
            }
        }).mount('#app');
    </script>
</body>

</html>
